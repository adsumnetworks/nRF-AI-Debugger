name: Build All Platforms 
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    # Cache root dependencies
    - name: Cache root dependencies
      uses: actions/cache@v4
      id: root-cache
      with:
        path: node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

    # Cache webview-ui dependencies
    - name: Cache webview-ui dependencies
      uses: actions/cache@v4
      id: webview-cache
      with:
        path: webview-ui/node_modules
        key: ${{ runner.os }}-npm-webview-${{ hashFiles('webview-ui/package-lock.json') }}

    - name: Install root dependencies
      if: steps.root-cache.outputs.cache-hit != 'true'
      run: npm install --include=optional

    - name: Install webview-ui dependencies
      if: steps.webview-cache.outputs.cache-hit != 'true'
      run: cd webview-ui && npm install --include=optional

    - name: Build Extension
      run: npm run package

    - name: Install vsce
      run: npm install -g @vscode/vsce

    - name: Package Extension
      shell: bash
      run: |
        VERSION=$(node -p "require('./package.json').version")
        vsce package --allow-package-secrets sendgrid -o nordic-debug-agent-${{ matrix.os }}-v${VERSION}.vsix

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-${{ matrix.os }}
        path: "*.vsix"
